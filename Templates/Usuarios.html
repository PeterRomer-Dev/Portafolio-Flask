<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Registrados</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Poppins', sans-serif; padding: 50px; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border: 1px solid #D4AF37; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #D4AF37; border-bottom: 2px solid #D4AF37; }
        tr:hover { background: #252525; }
    </style>    

</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    
        <h2 style="margin: 0;">📋 Usuarios Registrados en el Sistema</h2>

        <a href="/" style="
            color: #D4AF37; 
            text-decoration: none; 
            font-family: 'Poppins', sans-serif; 
            border: 1px solid #D4AF37; 
            padding: 8px 20px; 
            border-radius: 8px;
            font-size: 0.9rem;
            transition: 0.3s;
        " onmouseover="this.style.background='#D4AF37'; this.style.color='black';" 
           onmouseout="this.style.background='transparent'; this.style.color='#D4AF37';">
           Cerrar
        </a>
</div>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Cédula</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Fecha Registro</th>
            </tr>
        </thead>
        <tbody>
            {% for u in lista %}
            <tr>
                <td>{{ u[1] }}</td>
                <td>{{ u[2] }}</td>
                <td>{{ u[3] }}</td>
                <td>{{ u[5] }}</td>
                <td style="color: #888; font-size: 0.85rem;">{{ u[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
