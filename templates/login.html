<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Privado</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 40px; border-radius: 15px; border: 1px solid #D4AF37; text-align: center; }
        input { width: 100%; padding: 10px; margin: 20px 0; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 5px; }
        .btn-entrar { background: #D4AF37; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>    
    <div class="login-card">
        <h3>🔒 Área Restringida</h3>
        <form action="/verificar" method="POST">
            <input type="password" name="password" placeholder="Introduce la clave de acceso" required>
            <button type="submit" class="btn-entrar">Entrar</button>
        </form>
    
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <a href="/" style="color: #D4AF37; text-decoration: none; font-size: 0.9rem;">
            ← Volver al Portafolio
        </a>
    </div>
</body>
</html>
